<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home — Revenue Forecast</title>
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/account.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Khula:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.5rem;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .nav-brand-logo {
            height: 28px;
            width: auto;
        }

        .nav-brand-sep {
            width: 1px;
            height: 20px;
            background: #d1d5db;
        }

        .nav-brand-app {
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .btn-signout {
            padding: 0.4rem 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            background: white;
            font-size: 13px;
            font-weight: 500;
            color: #6b7280;
            cursor: pointer;
            font-family: inherit;
            text-decoration: none;
        }

        .btn-signout:hover {
            background: #f9fafb;
            color: #374151;
        }

        .welcome {
            margin-bottom: 2rem;
        }

        .welcome-title {
            font-family: 'Poppins', sans-serif;
            font-size: 26px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 0.25rem;
        }

        .welcome-sub {
            font-size: 15px;
            color: #6b7280;
        }

        .projects-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .projects-label {
            font-size: 13px;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-new-project {
            padding: 0.4rem 0.875rem;
            background: #005596;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-new-project:hover {
            background: #004a80;
        }

        .new-project-form {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
            display: none;
        }

        .new-project-form.visible {
            display: block;
        }

        .new-project-form input {
            width: 100%;
            padding: 0.55rem 0.75rem;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            margin-bottom: 0.75rem;
            box-sizing: border-box;
            transition: border-color 0.15s;
        }

        .new-project-form input:focus {
            border-color: #005596;
            box-shadow: 0 0 0 3px rgba(0,85,150,0.1);
        }

        .new-project-form-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-create {
            padding: 0.45rem 1rem;
            background: #005596;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-create:hover { background: #004a80; }

        .btn-cancel-form {
            padding: 0.45rem 1rem;
            background: white;
            color: #6b7280;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
        }

        .btn-cancel-form:hover { background: #f9fafb; }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1rem;
        }

        .project-tile {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 1.5rem;
            text-decoration: none;
            color: inherit;
            display: block;
            transition: box-shadow 0.15s, border-color 0.15s;
        }

        .project-tile:hover {
            border-color: #005596;
            box-shadow: 0 4px 16px rgba(0,85,150,0.1);
        }

        .project-tile-icon {
            font-size: 28px;
            margin-bottom: 0.75rem;
        }

        .project-tile-name {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 0.25rem;
        }

        .project-tile-desc {
            font-size: 13px;
            color: #6b7280;
        }

        .projects-empty {
            text-align: center;
            padding: 3rem 2rem;
            color: #9ca3af;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav">
            <div class="nav-brand">
                <img src="assets/improving-logo-simple.png" alt="Improving" class="nav-brand-logo">
                <span class="nav-brand-sep"></span>
                <span class="nav-brand-app">Revenue Forecast</span>
            </div>
            <div class="nav-right">
                <a href="account.html" class="btn-user">
                    <div class="btn-user-avatar">AD</div>
                    Austin Dircks
                </a>
                <a href="index.html" class="btn-signout">Sign out</a>
            </div>
        </nav>

        <div class="welcome">
            <div class="welcome-title">Welcome back</div>
            <p class="welcome-sub">Select a project to get started.</p>
        </div>

        <div class="projects-header">
            <div class="projects-label">Projects</div>
            <button class="btn-new-project" id="btnNewProject">+ New Project</button>
        </div>

        <div class="new-project-form" id="newProjectForm">
            <input type="text" id="newProjectName" placeholder="Project name" maxlength="100" />
            <div class="new-project-form-actions">
                <button class="btn-create" id="btnCreate">Create</button>
                <button class="btn-cancel-form" id="btnCancelForm">Cancel</button>
            </div>
        </div>

        <div class="project-grid" id="projectGrid"></div>
    </div>

    <script type="module">
        async function loadProjects() {
            const grid = document.getElementById('projectGrid');
            try {
                const projects = await fetch('/api/projects').then(r => r.json());
                if (!Array.isArray(projects) || projects.length === 0) {
                    grid.innerHTML = '<p class="projects-empty">No projects yet. Create one to get started.</p>';
                    return;
                }
                grid.innerHTML = projects.map(p => `
                    <a href="project.html?id=${p.id}" class="project-tile">
                        <div class="project-tile-icon">📈</div>
                        <div class="project-tile-name">${escapeHtml(p.name)}</div>
                        <p class="project-tile-desc">${escapeHtml(p.description || 'Revenue forecast project')}</p>
                    </a>
                `).join('');
            } catch (err) {
                grid.innerHTML = '<p class="projects-empty">Failed to load projects.</p>';
            }
        }

        function escapeHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        const form     = document.getElementById('newProjectForm');
        const nameInput = document.getElementById('newProjectName');

        document.getElementById('btnNewProject').addEventListener('click', () => {
            form.classList.add('visible');
            nameInput.focus();
        });

        document.getElementById('btnCancelForm').addEventListener('click', () => {
            form.classList.remove('visible');
            nameInput.value = '';
        });

        document.getElementById('btnCreate').addEventListener('click', createProject);
        nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') createProject(); });

        async function createProject() {
            const name = nameInput.value.trim();
            if (!name) { nameInput.focus(); return; }
            try {
                const project = await fetch('/api/projects', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name }),
                }).then(r => r.json());
                location.href = `project.html?id=${project.id}`;
            } catch (err) {
                alert('Failed to create project. Is the server running?');
            }
        }

        loadProjects();
    </script>
</body>
</html>
