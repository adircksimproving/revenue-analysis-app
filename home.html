<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home — Revenue Forecast</title>
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/account.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Khula:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.5rem;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .nav-brand-logo {
            height: 28px;
            width: auto;
        }

        .nav-brand-sep {
            width: 1px;
            height: 20px;
            background: #d1d5db;
        }

        .nav-brand-app {
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .btn-signout {
            padding: 0.4rem 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            background: white;
            font-size: 13px;
            font-weight: 500;
            color: #6b7280;
            cursor: pointer;
            font-family: inherit;
            text-decoration: none;
        }

        .btn-signout:hover {
            background: #f9fafb;
            color: #374151;
        }

        .welcome {
            margin-bottom: 2rem;
        }

        .welcome-title {
            font-family: 'Poppins', sans-serif;
            font-size: 26px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 0.25rem;
        }

        .welcome-sub {
            font-size: 15px;
            color: #6b7280;
        }

        .projects-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .projects-label {
            font-size: 13px;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-new-project {
            padding: 0.4rem 0.875rem;
            background: #005596;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-new-project:hover {
            background: #004a80;
        }

        .new-project-form {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
            display: none;
        }

        .new-project-form.visible {
            display: block;
        }

        .new-project-form input {
            width: 100%;
            padding: 0.55rem 0.75rem;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            margin-bottom: 0.75rem;
            box-sizing: border-box;
            transition: border-color 0.15s;
        }

        .new-project-form input:focus {
            border-color: #005596;
            box-shadow: 0 0 0 3px rgba(0,85,150,0.1);
        }

        .new-project-form-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-create {
            padding: 0.45rem 1rem;
            background: #005596;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-create:hover { background: #004a80; }

        .btn-cancel-form {
            padding: 0.45rem 1rem;
            background: white;
            color: #6b7280;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
        }

        .btn-cancel-form:hover { background: #f9fafb; }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1rem;
        }

        .project-tile {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 1.5rem;
            text-decoration: none;
            color: inherit;
            display: block;
            transition: box-shadow 0.15s, border-color 0.15s;
        }

        .project-tile:hover {
            border-color: #005596;
            box-shadow: 0 4px 16px rgba(0,85,150,0.1);
        }

        .project-tile-icon {
            font-size: 28px;
            margin-bottom: 0.75rem;
        }

        .project-tile-name {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 0.25rem;
        }

        .project-tile-desc {
            font-size: 13px;
            color: #6b7280;
        }

        .projects-empty {
            text-align: center;
            padding: 3rem 2rem;
            color: #9ca3af;
            font-size: 14px;
        }

        .project-tile-wrapper {
            position: relative;
        }

        .tile-menu-btn {
            position: absolute;
            top: 0.625rem;
            right: 0.625rem;
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            color: #9ca3af;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .tile-menu-btn:hover {
            background: #f3f4f6;
            color: #374151;
        }

        .tile-menu-dropdown {
            position: absolute;
            top: 2.75rem;
            right: 0.5rem;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            z-index: 10;
            min-width: 160px;
            display: none;
        }

        .tile-menu-dropdown.open {
            display: block;
        }

        .tile-menu-item {
            display: block;
            width: 100%;
            padding: 0.625rem 1rem;
            background: none;
            border: none;
            text-align: left;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            color: #374151;
            border-radius: 8px;
        }

        .tile-menu-item:hover {
            background: #f9fafb;
        }

        .tile-menu-delete {
            color: #dc2626;
        }

        .tile-menu-delete:hover {
            background: #fef2f2;
        }

        .delete-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .delete-overlay.open {
            display: flex;
        }

        .delete-dialog {
            background: white;
            border-radius: 12px;
            padding: 1.75rem 2rem;
            max-width: 380px;
            width: calc(100% - 2rem);
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .delete-dialog-title {
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
        }

        .delete-dialog-body {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 1.5rem;
        }

        .delete-dialog-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }

        .btn-delete-confirm {
            padding: 0.45rem 1rem;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-delete-confirm:hover {
            background: #b91c1c;
        }

        .btn-cancel-delete {
            padding: 0.45rem 1rem;
            background: white;
            color: #6b7280;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
        }

        .btn-cancel-delete:hover {
            background: #f9fafb;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav">
            <div class="nav-brand">
                <img src="assets/improving-logo-simple.png" alt="Improving" class="nav-brand-logo">
                <span class="nav-brand-sep"></span>
                <span class="nav-brand-app">Revenue Forecast</span>
            </div>
            <div class="nav-right">
                <a href="account.html" class="btn-user">
                    <div class="btn-user-avatar">AD</div>
                    Austin Dircks
                </a>
                <a href="index.html" class="btn-signout">Sign out</a>
            </div>
        </nav>

        <div class="welcome">
            <div class="welcome-title">Welcome back</div>
            <p class="welcome-sub">Select a project to get started.</p>
        </div>

        <div class="projects-header">
            <div class="projects-label">Projects</div>
            <button class="btn-new-project" id="btnNewProject">+ New Project</button>
        </div>

        <div class="new-project-form" id="newProjectForm">
            <input type="text" id="newProjectName" placeholder="Project name" maxlength="100" />
            <div class="new-project-form-actions">
                <button class="btn-create" id="btnCreate">Create</button>
                <button class="btn-cancel-form" id="btnCancelForm">Cancel</button>
            </div>
        </div>

        <div class="project-grid" id="projectGrid"></div>
    </div>

    <div class="delete-overlay" id="deleteOverlay">
        <div class="delete-dialog">
            <div class="delete-dialog-title">Delete project?</div>
            <p class="delete-dialog-body">"<span id="deleteProjectName"></span>" will be deleted. This cannot be easily undone.</p>
            <div class="delete-dialog-actions">
                <button class="btn-cancel-delete" id="btnCancelDelete">Cancel</button>
                <button class="btn-delete-confirm" id="btnConfirmDelete">Delete</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { api } from './js/api.js';

        async function loadProjects() {
            const grid = document.getElementById('projectGrid');
            try {
                const projects = await fetch('/api/projects').then(r => r.json());
                if (!Array.isArray(projects) || projects.length === 0) {
                    grid.innerHTML = '<p class="projects-empty">No projects yet. Create one to get started.</p>';
                    return;
                }
                grid.innerHTML = projects.map(p => `
                    <div class="project-tile-wrapper" data-id="${p.id}">
                        <a href="project.html?id=${p.id}" class="project-tile">
                            <div class="project-tile-icon">📈</div>
                            <div class="project-tile-name">${escapeHtml(p.name)}</div>
                            <p class="project-tile-desc">${escapeHtml(p.description || 'Revenue forecast project')}</p>
                        </a>
                        <button class="tile-menu-btn" data-id="${p.id}" data-name="${escapeHtml(p.name)}" aria-label="Project options">⋮</button>
                        <div class="tile-menu-dropdown">
                            <button class="tile-menu-item tile-menu-delete" data-id="${p.id}" data-name="${escapeHtml(p.name)}">Delete project</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                grid.innerHTML = '<p class="projects-empty">Failed to load projects.</p>';
            }
        }

        function escapeHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // Close all dropdowns when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.tile-menu-btn') && !e.target.closest('.tile-menu-dropdown')) {
                document.querySelectorAll('.tile-menu-dropdown.open').forEach(d => d.classList.remove('open'));
            }
        });

        // Delegate clicks inside the project grid
        document.getElementById('projectGrid').addEventListener('click', (e) => {
            const menuBtn = e.target.closest('.tile-menu-btn');
            if (menuBtn) {
                e.preventDefault();
                const wrapper = menuBtn.closest('.project-tile-wrapper');
                const dropdown = wrapper.querySelector('.tile-menu-dropdown');
                document.querySelectorAll('.tile-menu-dropdown.open').forEach(d => {
                    if (d !== dropdown) d.classList.remove('open');
                });
                dropdown.classList.toggle('open');
                return;
            }

            const deleteBtn = e.target.closest('.tile-menu-delete');
            if (deleteBtn) {
                e.preventDefault();
                deleteBtn.closest('.tile-menu-dropdown').classList.remove('open');
                showDeleteConfirm(deleteBtn.dataset.id, deleteBtn.dataset.name);
            }
        });

        // Delete confirmation modal
        let pendingDeleteId = null;

        function showDeleteConfirm(id, name) {
            pendingDeleteId = id;
            document.getElementById('deleteProjectName').textContent = name;
            document.getElementById('deleteOverlay').classList.add('open');
        }

        document.getElementById('btnCancelDelete').addEventListener('click', () => {
            pendingDeleteId = null;
            document.getElementById('deleteOverlay').classList.remove('open');
        });

        document.getElementById('deleteOverlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                pendingDeleteId = null;
                document.getElementById('deleteOverlay').classList.remove('open');
            }
        });

        document.getElementById('btnConfirmDelete').addEventListener('click', async () => {
            if (!pendingDeleteId) return;
            const id = pendingDeleteId;
            pendingDeleteId = null;
            document.getElementById('deleteOverlay').classList.remove('open');
            try {
                await api.deleteProject(id);
                const wrapper = document.querySelector(`.project-tile-wrapper[data-id="${id}"]`);
                if (wrapper) wrapper.remove();
                const grid = document.getElementById('projectGrid');
                if (!grid.querySelector('.project-tile-wrapper')) {
                    grid.innerHTML = '<p class="projects-empty">No projects yet. Create one to get started.</p>';
                }
            } catch (err) {
                alert('Failed to delete project.');
            }
        });

        const form      = document.getElementById('newProjectForm');
        const nameInput = document.getElementById('newProjectName');

        document.getElementById('btnNewProject').addEventListener('click', () => {
            form.classList.add('visible');
            nameInput.focus();
        });

        document.getElementById('btnCancelForm').addEventListener('click', () => {
            form.classList.remove('visible');
            nameInput.value = '';
        });

        document.getElementById('btnCreate').addEventListener('click', createProject);
        nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') createProject(); });

        async function createProject() {
            const name = nameInput.value.trim();
            if (!name) { nameInput.focus(); return; }
            try {
                const project = await fetch('/api/projects', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name }),
                }).then(r => r.json());
                location.href = `project.html?id=${project.id}`;
            } catch (err) {
                alert('Failed to create project. Is the server running?');
            }
        }

        loadProjects();
    </script>
</body>
</html>
