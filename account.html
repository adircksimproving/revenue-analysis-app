<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account — Revenue Forecast</title>
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/account.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Khula:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.5rem;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .nav-brand-logo {
            height: 28px;
            width: auto;
        }

        .nav-brand-sep {
            width: 1px;
            height: 20px;
            background: #d1d5db;
        }

        .nav-brand-app {
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .btn-signout {
            padding: 0.4rem 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            background: white;
            font-size: 13px;
            font-weight: 500;
            color: #6b7280;
            cursor: pointer;
            font-family: inherit;
            text-decoration: none;
        }

        .btn-signout:hover {
            background: #f9fafb;
            color: #374151;
        }

        .field {
            margin-bottom: 0.75rem;
        }

        .field label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 0.3rem;
        }

        .field input[type="text"] {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            color: #1a1a1a;
            box-sizing: border-box;
        }

        .field input[type="text"]:focus {
            outline: none;
            border-color: #005596;
            box-shadow: 0 0 0 2px rgba(0, 85, 150, 0.1);
        }

        .btn-primary {
            padding: 0.5rem 1.25rem;
            background: #005596;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: #004a84;
        }

        .auth-flash {
            padding: 0.6rem 0.9rem;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 0.75rem;
        }

        .auth-flash-ok {
            background: #ecfdf5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .auth-flash-error {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav">
            <a href="/portal" class="nav-brand">
                <img src="assets/improving-logo-simple.png" alt="Improving" class="nav-brand-logo">
                <span class="nav-brand-sep"></span>
                <span class="nav-brand-app">Revenue Forecast</span>
            </a>
            <div class="nav-right">
                <a id="adminLink" href="" class="btn-signout" style="display:none;">Admin</a>
                <a href="/auth/logout" class="btn-signout">Sign out</a>
            </div>
        </nav>

        <div class="account-header">
            <div class="account-header-title">Account</div>
            <p class="account-header-sub">Manage your profile and settings.</p>
        </div>

        <!-- General User Info -->
        <div class="section-label">General Information</div>
        <div class="account-card">
            <div class="profile-row">
                <div class="profile-avatar" id="profileAvatar"></div>
                <div class="profile-details">
                    <div class="profile-name" id="profileName"></div>
                    <div class="profile-email" id="profileEmail"></div>
                    <span class="profile-role" id="profileRole"></span>
                </div>
            </div>
        </div>

        <!-- Edit Name -->
        <div class="section-label">Name</div>
        <div class="account-card">
            <div id="nameFlash" class="auth-flash" hidden></div>
            <form id="nameForm">
                <div class="field">
                    <label for="firstNameInput">First name</label>
                    <input type="text" id="firstNameInput" name="firstName" required autocomplete="given-name" />
                </div>
                <div class="field">
                    <label for="lastNameInput">Last name</label>
                    <input type="text" id="lastNameInput" name="lastName" required autocomplete="family-name" />
                </div>
                <button type="submit" class="btn-primary">Update name</button>
            </form>
        </div>

        <!-- Settings -->
        <div class="section-label">Settings</div>
        <div class="account-card">
            <p class="placeholder-message">Settings will be available in a future update.</p>
        </div>

        <!-- Programs / Clients -->
        <div class="section-label">Programs &amp; Clients</div>
        <div class="account-card">
            <div class="program-list" id="clientsList">
                <p style="font-size:13px; color:#9ca3af;">Loading...</p>
            </div>
        </div>

        <!-- Invite New Users -->
        <div class="section-label">Invite New Users</div>
        <div class="account-card">
            <div class="invite-placeholder">
                <span class="invite-placeholder-icon">✉️</span>
                <span class="invite-placeholder-text">User invitation will be available in a future update.</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { getInitials } from './js/user.js';

        const PORTAL_BASE = window.location.hostname === 'localhost'
            ? 'http://localhost:3001'
            : 'https://portal-production-2c38.up.railway.app';

        async function loadMe() {
            try {
                const me = await fetch('/api/me').then(r => r.ok ? r.json() : null);
                if (!me) return;
                const displayName = me.name || me.email || '';
                document.getElementById('profileName').textContent = displayName;
                document.getElementById('profileEmail').textContent = me.email || '';
                document.getElementById('profileAvatar').textContent = getInitials(displayName);
                document.getElementById('profileRole').textContent = me.isAdmin ? 'Admin' : 'User';
                document.getElementById('firstNameInput').value = me.firstName || '';
                document.getElementById('lastNameInput').value = me.lastName || '';
                if (me.isAdmin) {
                    const link = document.getElementById('adminLink');
                    link.href = `${PORTAL_BASE}/admin`;
                    link.style.display = '';
                }
            } catch {}
        }

        function showNameFlash(msg, isError) {
            const el = document.getElementById('nameFlash');
            el.textContent = msg;
            el.className = 'auth-flash ' + (isError ? 'auth-flash-error' : 'auth-flash-ok');
            el.hidden = false;
        }

        document.getElementById('nameForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const firstName = document.getElementById('firstNameInput').value.trim();
            const lastName = document.getElementById('lastNameInput').value.trim();
            try {
                const res = await fetch('/api/me/name', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firstName, lastName }),
                });
                if (!res.ok) {
                    const { error } = await res.json();
                    showNameFlash(error || 'Failed to update name.', true);
                    return;
                }
                const { name } = await res.json();
                document.getElementById('profileName').textContent = name;
                document.getElementById('profileAvatar').textContent = getInitials(name);
                showNameFlash('Name updated.', false);
            } catch {
                showNameFlash('Failed to update name.', true);
            }
        });

        async function loadClients() {
            const list = document.getElementById('clientsList');
            try {
                const projects = await fetch('/api/projects').then(r => r.json());
                if (!Array.isArray(projects) || projects.length === 0) {
                    list.innerHTML = '<p style="font-size:13px; color:#9ca3af;">No clients yet.</p>';
                    return;
                }

                const groups = new Map();
                for (const p of projects) {
                    const key = p.clientName || 'Unknown';
                    if (!groups.has(key)) groups.set(key, []);
                    groups.get(key).push(p);
                }

                list.innerHTML = [...groups.entries()].map(([client, items]) => `
                    <div class="program-item">
                        <div class="program-header">
                            <span class="program-icon">🏢</span>
                            <span class="program-name">${escapeHtml(client)}</span>
                        </div>
                        <div class="project-list">
                            ${items.map(p => `
                                <div class="project-item">
                                    <span class="project-item-icon">📈</span>
                                    <span class="project-item-name">${escapeHtml(p.name)}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            } catch {
                list.innerHTML = '<p style="font-size:13px; color:#9ca3af;">Failed to load clients.</p>';
            }
        }

        function escapeHtml(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        loadMe();
        loadClients();
    </script>
</body>
</html>
